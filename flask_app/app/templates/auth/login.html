<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <div>
            <form method="POST">
                {{ form.hidden_tag() }}
                <div>
                {{ form.username.label() }}
                {{ form.username(placeholder="Username") }}
                </div>
                <div>
                {{ form.password.label() }}
                {{ form.password(placeholder="Password") }}
                </div>    
                <div>
                    <a href="{{ url_for('auth.forgotpassword') }}">Forgot Password?</a>
                </div>
                <div>
                {{ form.submit() }}
                </div>
            </form>
        </div>
    </body>
</html>
