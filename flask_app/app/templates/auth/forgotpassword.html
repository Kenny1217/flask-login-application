<!DOCTYPE html>
<html>
    <head>
        <title>Forgot Password</title>
    </head>
    <body>
        <div>
            <form method="POST">
                {{ form.hidden_tag() }}
                <div>
                {{ form.email.label() }}
                {{ form.email(placeholder="Email") }}
                </div>         
                <div>
                {{ form.submit() }}
                </div>
            </form>
        </div>
    </body>
</html>
